name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Setup Java
        uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with: { packages: "platforms;android-34 build-tools;34.0.0" }

      - name: Install Capacitor & Build Web
        working-directory: ./android_app
        run: npm install && npx cap sync android

      - name: Build APK
        working-directory: ./android_app/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: germination-app
          path: android_app/android/app/build/outputs/apk/debug/app-debug.apk
